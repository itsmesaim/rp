<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="135%" y2="135%">
      <stop offset="0%" style="stop-color:#C2556A"/>
      <stop offset="100%" style="stop-color:#7B2D8B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0A8B8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C2556A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>

  <!-- Bold R -->
  <text
    x="7" y="46"
    font-family="Arial Black, sans-serif"
    font-size="44" font-weight="900"
    fill="white" opacity="0.95"
  >R</text>

  <!-- Sparkle dots top right -->
  <circle cx="52" cy="12" r="3"   fill="white" opacity="0.9"/>
  <circle cx="44" cy="17" r="2"   fill="white" opacity="0.6"/>
  <circle cx="56" cy="20" r="1.5" fill="white" opacity="0.5"/>

  <!-- Tiny rising line chart -->
  <polyline
    points="40,34 46,27 52,30 58,22"
    fill="none" stroke="white" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.75"
  />
  <!-- Peak dot -->
  <circle cx="58" cy="22" r="2.5" fill="white" opacity="0.9"/>
</svg>
